<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forge — Crucible Layout</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@700&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   RESET & TOKENS
   ═══════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  /* surfaces */
  --s950:#060608; --s900:#0a0a0f; --s800:#111118; --s700:#1a1a26;
  --s600:#252536; --s500:#363650; --s400:#4a4a68; --s300:#6a6a88;

  /* gold accent */
  --accent-500:#d4a834; --accent-400:#e0bc4a; --accent-300:#ecd06a;

  /* teal */
  --teal:#2dd4bf; --teal-light:#5eead4;

  /* bronze */
  --bronze-500:#a08050; --bronze-400:#b89868; --bronze-300:#c8a878;

  /* elements */
  --fire:#e8553a; --cold:#3a9be8; --lightning:#d4c040;
  --poison:#2db369; --shadow:#8b3ae8; --chaos:#e83a8b; --physical:#c0c0c0;

  /* tiers */
  --t1:#8a8a8a; --t2:#3a9be8; --t3:#9b59b6; --t4:#e8553a;

  /* feedback */
  --success:#34d399; --warning:#fbbf24; --danger:#f87171; --info:#60a5fa;

  /* shadows */
  --shadow-card: 0 2px 8px rgba(0,0,0,0.4), 0 0 1px rgba(255,255,255,0.05);
  --shadow-button: 0 4px 12px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
  --shadow-glow-accent: 0 0 16px rgba(212,168,52,0.25);
  --shadow-inset: inset 0 2px 4px rgba(0,0,0,0.5);

  /* fonts */
  --font-display: 'Rajdhani', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

body {
  background: var(--s950);
  font-family: var(--font-body);
  color: #e8e8f0;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh;
  overflow: hidden;
}

/* ═══════════════════════════════════════
   APP FRAME  (9:16 portrait)
   ═══════════════════════════════════════ */
.app-frame {
  position: relative;
  width: calc(100vh * 9 / 16);
  max-width: 100vw;
  height: 100vh;
  max-height: 100vh;
  background: var(--s900);
  overflow: hidden;
  display: flex; flex-direction: column;
}

/* atmospheric gradient */
.app-frame::before {
  content:'';
  position:absolute; inset:0;
  background: radial-gradient(ellipse at 50% 0%, rgba(30,25,40,0.4) 0%, transparent 60%);
  pointer-events:none; z-index:1;
}

/* noise overlay */
.noise {
  position:fixed; inset:0; z-index:9999; pointer-events:none; opacity:0.025;
}

/* ═══════════════════════════════════════
   PAGE-LEVEL
   ═══════════════════════════════════════ */
.page {
  position:relative; z-index:2;
  display:flex; flex-direction:column;
  height:100%; padding:10px 10px 8px;
  gap:8px;
  animation: pageEnter 0.35s ease-out both;
}

@keyframes pageEnter {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes scaleIn {
  from { transform:scale(0.85); opacity:0; }
  to   { transform:scale(1); opacity:1; }
}
@keyframes orbGlow {
  0%,100% { filter:brightness(1); }
  50%     { filter:brightness(1.15) drop-shadow(0 0 6px var(--glow-color, rgba(212,168,52,0.5))); }
}
@keyframes pulseRing {
  0%   { box-shadow: 0 0 0 0 var(--glow-color, rgba(212,168,52,0.5)); }
  70%  { box-shadow: 0 0 0 8px transparent; }
  100% { box-shadow: 0 0 0 0 transparent; }
}
@keyframes toastIn {
  from { transform:translateY(20px) scale(0.9); opacity:0; }
  to   { transform:translateY(0) scale(1); opacity:1; }
}
@keyframes toastOut {
  from { opacity:1; }
  to   { opacity:0; transform:translateY(-10px); }
}

/* ═══════════════════════════════════════
   HEADER
   ═══════════════════════════════════════ */
.header {
  display:flex; justify-content:space-between; align-items:flex-start;
  flex-shrink:0;
}
.header-left h1 {
  font-family:var(--font-display); font-weight:700; font-size:18px;
  color:var(--accent-400); text-transform:uppercase; letter-spacing:0.06em;
  line-height:1;
}
.header-left .sub {
  font-size:11px; color:var(--s400); margin-top:2px;
}
.header-left .sub .hl { color:var(--accent-300); font-family:var(--font-mono); font-weight:700; }
.header-right { display:flex; align-items:center; gap:8px; }
.timer {
  font-family:var(--font-mono); font-weight:700; font-size:16px;
  color:#fff; background:var(--s700); padding:4px 10px; border-radius:6px;
  box-shadow:var(--shadow-inset);
}
.btn-done {
  font-family:var(--font-display); font-weight:700; font-size:12px;
  text-transform:uppercase; letter-spacing:0.04em;
  color:var(--s900); background:linear-gradient(135deg,var(--accent-500),var(--accent-300));
  border:none; border-radius:6px; padding:6px 14px; cursor:pointer;
  box-shadow:var(--shadow-button);
  transition: transform 0.15s ease-out, box-shadow 0.15s ease-out;
}
.btn-done:hover { transform:scale(1.08); }
.btn-done:active { transform:scale(0.93); }

/* ═══════════════════════════════════════
   SIDE-BY-SIDE ITEM PANELS
   ═══════════════════════════════════════ */
.items-row {
  display:flex; gap:8px; flex-shrink:0;
}
.item-panel {
  flex:1; border-radius:12px; padding:8px;
  box-shadow:var(--shadow-card);
  transition: border-color 0.15s ease-out, background 0.15s ease-out, box-shadow 0.15s ease-out;
  cursor:pointer; user-select:none;
}
.item-panel.active {
  background:var(--s700);
  border:1.5px solid rgba(212,168,52,0.4);
  box-shadow:var(--shadow-card), 0 0 12px rgba(212,168,52,0.08);
}
.item-panel.inactive {
  background:var(--s800);
  border:1.5px solid var(--s600);
}
.item-panel .label {
  font-family:var(--font-display); font-weight:700; font-size:13px;
  text-transform:uppercase; letter-spacing:0.04em;
  margin-bottom:2px;
}
.item-panel.active .label { color:var(--accent-400); }
.item-panel.inactive .label { color:var(--s400); }
.item-panel .sublabel {
  font-size:9px; color:var(--s400); margin-bottom:6px; letter-spacing:0.03em;
}

.slot-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:5px;
}
.slot {
  width:100%; aspect-ratio:1; border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  position:relative; cursor:pointer;
  transition: transform 0.15s ease-out, box-shadow 0.15s ease-out;
}
.slot:hover { transform:scale(1.08); }
.slot:active { transform:scale(0.93); }
.slot.empty {
  border:2px dashed var(--s500); background:var(--s950);
  color:var(--s500); font-size:18px;
}
.slot.filled {
  border:2.5px solid var(--tier-color, var(--s500));
  overflow:hidden;
}
.slot.filled .gem-inner {
  width:100%; height:100%; display:flex; flex-direction:column;
  align-items:center; justify-content:center; position:relative;
}
.slot.filled .gem-inner .emoji { font-size:20px; line-height:1; position:relative; z-index:1; }
.slot.filled .gem-inner .stat-val {
  font-family:var(--font-display); font-weight:700; font-size:10px;
  color:#fff; position:relative; z-index:1; margin-top:1px;
}
.slot .compound-badge {
  position:absolute; top:2px; right:2px;
  font-family:var(--font-display); font-weight:700; font-size:8px;
  background:var(--accent-500); color:var(--s900);
  width:14px; height:14px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  z-index:3;
}

/* ═══════════════════════════════════════
   COMBINATION WORKBENCH
   ═══════════════════════════════════════ */
.workbench {
  flex-shrink:0;
  border-radius:14px; padding:10px 12px;
  background: radial-gradient(ellipse at 50% 50%, rgba(212,168,52,0.03) 0%, transparent 70%), var(--s800);
  border:1.5px solid rgba(212,168,52,0.2);
  box-shadow: var(--shadow-card), inset 0 0 30px rgba(212,168,52,0.02);
  position:relative; overflow:hidden;
}
.workbench::before {
  content:''; position:absolute; inset:0;
  background: radial-gradient(circle at 50% 40%, rgba(212,168,52,0.04), transparent 60%);
  pointer-events:none;
}
.wb-title {
  font-family:var(--font-display); font-weight:700; font-size:11px;
  color:var(--bronze-300); text-transform:uppercase; letter-spacing:0.06em;
  text-align:center; margin-bottom:8px; position:relative; z-index:1;
}
.wb-flow {
  display:flex; align-items:center; gap:6px;
  justify-content:center; position:relative; z-index:1;
}
.wb-slot {
  width:52px; height:52px; border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; flex-shrink:0;
  transition: transform 0.15s ease-out, box-shadow 0.15s ease-out, border-color 0.15s ease-out;
}
.wb-slot:hover { transform:scale(1.08); }
.wb-slot:active { transform:scale(0.93); }
.wb-slot.empty {
  border:2px dashed rgba(212,168,52,0.3);
  background:var(--s950); box-shadow:var(--shadow-inset);
  color:var(--s500); font-size:20px;
}
.wb-slot.filled {
  border:2.5px solid var(--tier-color, var(--s500));
  overflow:hidden;
}
.wb-slot.filled .gem-inner { width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; }
.wb-slot.filled .gem-inner .emoji { font-size:22px; line-height:1; position:relative; z-index:1; }
.wb-slot.filled .gem-inner .stat-val {
  font-family:var(--font-display); font-weight:700; font-size:9px;
  color:#fff; position:relative; z-index:1; margin-top:1px;
}

.wb-op {
  font-size:18px; color:var(--s400); flex-shrink:0; line-height:1;
}
.wb-arrow { color:var(--bronze-400); font-size:16px; flex-shrink:0; }

.wb-result {
  min-width:80px; height:52px; border-radius:10px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:0 8px; flex-shrink:0;
  border:1.5px solid var(--s600); background:var(--s950);
  box-shadow:var(--shadow-inset);
  transition: border-color 0.25s, box-shadow 0.25s;
}
.wb-result.valid {
  border-color: var(--result-color, var(--accent-500));
  box-shadow: var(--shadow-inset), 0 0 14px var(--result-glow, rgba(212,168,52,0.25));
}
.wb-result.invalid { border-color: var(--danger); }
.wb-result .r-icon { font-size:18px; line-height:1; }
.wb-result .r-name {
  font-family:var(--font-display); font-weight:700; font-size:9px;
  color:#fff; text-transform:uppercase; letter-spacing:0.03em; margin-top:1px;
  white-space:nowrap;
}
.wb-result .r-effect {
  font-size:7.5px; color:var(--s300); white-space:nowrap; margin-top:0px;
}
.wb-result .r-empty {
  font-size:18px; color:var(--s500); font-weight:700;
}
.wb-result .r-hint {
  font-size:8px; color:var(--s400); white-space:nowrap;
}
.wb-result .r-invalid {
  font-size:10px; color:var(--danger); font-weight:700;
}

.wb-actions {
  display:flex; gap:6px; justify-content:center; margin-top:8px;
  position:relative; z-index:1;
}
.btn-combine {
  font-family:var(--font-display); font-weight:700; font-size:11px;
  text-transform:uppercase; letter-spacing:0.03em;
  padding:5px 14px; border-radius:6px; border:none; cursor:pointer;
  transition: transform 0.15s ease-out, box-shadow 0.15s ease-out, background 0.15s ease-out, filter 0.15s ease-out;
}
.btn-combine.enabled {
  color:var(--s900); background:linear-gradient(135deg,var(--accent-500),var(--accent-300));
  box-shadow:var(--shadow-button), var(--shadow-glow-accent);
}
.btn-combine.enabled:hover { transform:scale(1.08); }
.btn-combine.enabled:active { transform:scale(0.93); }
.btn-combine.disabled {
  color:var(--s400); background:var(--s600);
  cursor:default; pointer-events:none;
}
.btn-clear {
  font-family:var(--font-display); font-weight:700; font-size:11px;
  text-transform:uppercase; letter-spacing:0.03em;
  padding:5px 12px; border-radius:6px; border:1px solid var(--s600);
  background:var(--s700); color:var(--s300); cursor:pointer;
  transition: transform 0.15s ease-out, background 0.15s ease-out;
}
.btn-clear:hover { background:var(--s600); transform:scale(1.08); }
.btn-clear:active { transform:scale(0.93); }

/* ═══════════════════════════════════════
   SYNERGY TRACKER
   ═══════════════════════════════════════ */
.synergies {
  flex-shrink:0; display:flex; align-items:center; gap:6px;
  padding:0 2px;
}
.synergies .syn-label {
  font-family:var(--font-display); font-weight:700; font-size:9px;
  color:var(--s400); text-transform:uppercase; letter-spacing:0.06em;
  flex-shrink:0;
}
.syn-pills { display:flex; gap:4px; flex-wrap:wrap; }
.syn-pill {
  font-family:var(--font-display); font-weight:700; font-size:9px;
  padding:2px 8px; border-radius:10px; white-space:nowrap;
}
.syn-pill.inactive { background:var(--s600); color:var(--s400); }
.syn-pill.active { background:rgba(52,211,153,0.15); color:var(--success); border:1px solid rgba(52,211,153,0.25); }

/* ═══════════════════════════════════════
   STOCKPILE
   ═══════════════════════════════════════ */
.stockpile {
  flex:1; min-height:0;
  border-radius:12px; padding:8px;
  background:var(--s800); border:1px solid var(--s600);
  box-shadow:var(--shadow-card);
  display:flex; flex-direction:column;
}
.stockpile .sp-label {
  font-family:var(--font-display); font-weight:700; font-size:11px;
  color:var(--s400); text-transform:uppercase; letter-spacing:0.04em;
  margin-bottom:6px; flex-shrink:0;
}
.sp-grid {
  display:grid; grid-template-columns:repeat(5,1fr); gap:5px;
  overflow-y:auto; flex:1; min-height:0;
  padding-right:2px;
}
.sp-grid::-webkit-scrollbar { width:4px; }
.sp-grid::-webkit-scrollbar-track { background:transparent; }
.sp-grid::-webkit-scrollbar-thumb { background:var(--s500); border-radius:2px; }

.gem-card {
  display:flex; flex-direction:column; align-items:center;
  cursor:pointer; user-select:none;
  transition: transform 0.15s ease-out, filter 0.15s ease-out;
}
.gem-card:hover { transform:scale(1.08); filter:brightness(1.1); }
.gem-card:active { transform:scale(0.93); }
.gem-card.selected {
  --glow-color: var(--elem-color, rgba(212,168,52,0.5));
  animation: orbGlow 1.5s infinite, pulseRing 1.5s infinite;
}
.gem-card .gc-icon {
  width:100%; aspect-ratio:1; border-radius:8px;
  border:2.5px solid var(--tier-color, var(--s500));
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  position:relative; overflow:hidden;
}
.gem-card .gc-icon .bg-fill {
  position:absolute; inset:0;
  /* element gradient set via inline style */
}
.gem-card .gc-icon .specular {
  position:absolute; inset:0;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.2) 0%, transparent 60%);
}
.gem-card .gc-icon .emoji { font-size:18px; position:relative; z-index:1; line-height:1; }
.gem-card .gc-icon .stat-val {
  font-family:var(--font-display); font-weight:700; font-size:9px;
  color:#fff; position:relative; z-index:1; margin-top:1px;
}
.gem-card .gc-name {
  font-size:7.5px; color:var(--s400); text-align:center;
  margin-top:2px; line-height:1.1; white-space:nowrap;
  overflow:hidden; text-overflow:ellipsis; max-width:100%;
}

/* T3+ glow */
.gem-card .gc-icon.t3-glow {
  box-shadow: 0 0 8px var(--tier-color);
}

/* ═══════════════════════════════════════
   STATS BAR
   ═══════════════════════════════════════ */
.stats-bar {
  display:grid; grid-template-columns:repeat(4,1fr); gap:4px;
  flex-shrink:0;
}
.stat-box {
  background:var(--s700); border-radius:8px; padding:4px 0;
  box-shadow:var(--shadow-inset);
  display:flex; flex-direction:column; align-items:center;
}
.stat-box .st-label {
  font-family:var(--font-display); font-weight:700; font-size:8px;
  text-transform:uppercase; color:var(--s400); letter-spacing:0.04em;
}
.stat-box .st-val {
  font-family:var(--font-mono); font-weight:700; font-size:14px;
  color:#fff; font-variant-numeric:tabular-nums;
}

/* ═══════════════════════════════════════
   TOAST
   ═══════════════════════════════════════ */
.toast-container {
  position:absolute; bottom:80px; left:50%; transform:translateX(-50%);
  z-index:100; pointer-events:none;
}
.toast {
  font-family:var(--font-display); font-weight:700; font-size:13px;
  color:var(--success); background:rgba(17,17,24,0.92);
  border:1px solid rgba(52,211,153,0.3); border-radius:8px;
  padding:8px 18px; white-space:nowrap;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  animation: toastIn 0.25s ease-out;
}
.toast.out { animation: toastOut 0.3s ease-in forwards; }

/* helper for element gradient on filled slots */
.elem-bg {
  position:absolute; inset:0;
  border-radius:inherit;
}
.elem-specular {
  position:absolute; inset:0;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.2) 0%, transparent 60%);
  border-radius:inherit;
}
</style>
</head>
<body>

<!-- Noise overlay -->
<svg class="noise" xmlns="http://www.w3.org/2000/svg"><filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(#noiseFilter)"/></svg>

<div class="app-frame">
<div class="page" id="page">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <h1>Forge Phase</h1>
      <div class="sub">Round 1 &mdash; Flux: <span class="hl">8</span></div>
    </div>
    <div class="header-right">
      <div class="timer" id="timer">1:15</div>
      <button class="btn-done">Done Forging</button>
    </div>
  </div>

  <!-- SIDE-BY-SIDE ITEMS -->
  <div class="items-row">
    <!-- Weapon -->
    <div class="item-panel active" id="panel-weapon" data-panel="weapon">
      <div class="label">&#9876; Weapon</div>
      <div class="sublabel">STR / VIT</div>
      <div class="slot-grid" id="weapon-slots"></div>
    </div>
    <!-- Armor -->
    <div class="item-panel inactive" id="panel-armor" data-panel="armor">
      <div class="label">&#128737; Armor</div>
      <div class="sublabel">VIT / STR</div>
      <div class="slot-grid" id="armor-slots"></div>
    </div>
  </div>

  <!-- COMBINATION WORKBENCH -->
  <div class="workbench">
    <div class="wb-title">&#9670; FORGE &#9670;</div>
    <div class="wb-flow">
      <div class="wb-slot empty" id="wb-a" data-wb="a"><span>+</span></div>
      <span class="wb-op">+</span>
      <div class="wb-slot empty" id="wb-b" data-wb="b"><span>+</span></div>
      <span class="wb-arrow">&#9654;</span>
      <div class="wb-result" id="wb-result">
        <span class="r-empty">?</span>
        <span class="r-hint">Drop two gems</span>
      </div>
    </div>
    <div class="wb-actions">
      <button class="btn-combine disabled" id="btn-combine">Combine 2&#9889;</button>
      <button class="btn-clear" id="btn-clear">Clear</button>
    </div>
  </div>

  <!-- SYNERGIES -->
  <div class="synergies">
    <span class="syn-label">Synergies</span>
    <div class="syn-pills">
      <span class="syn-pill inactive">Fire Mastery (3/5)</span>
      <span class="syn-pill active">Fortified (2/2)</span>
      <span class="syn-pill inactive">Vampiric (1/3)</span>
    </div>
  </div>

  <!-- STOCKPILE -->
  <div class="stockpile">
    <div class="sp-label">Stockpile (<span id="sp-count">14</span>)</div>
    <div class="sp-grid" id="sp-grid"></div>
  </div>

  <!-- STATS BAR -->
  <div class="stats-bar">
    <div class="stat-box"><span class="st-label">HP</span><span class="st-val">240</span></div>
    <div class="stat-box"><span class="st-label">DMG</span><span class="st-val">35</span></div>
    <div class="stat-box"><span class="st-label">Armor</span><span class="st-val">12%</span></div>
    <div class="stat-box"><span class="st-label">Crit</span><span class="st-val">8%</span></div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>
</div>
</div>

<script>
/* ═══════════════════════════════════════
   DATA
   ═══════════════════════════════════════ */
const ELEM = {
  fire:      { color:'#e8553a' },
  cold:      { color:'#3a9be8' },
  lightning: { color:'#d4c040' },
  poison:    { color:'#2db369' },
  shadow:    { color:'#8b3ae8' },
  chaos:     { color:'#e83a8b' },
  physical:  { color:'#c0c0c0' },
};
const TIER_COLOR = { 1:'#8a8a8a', 2:'#3a9be8', 3:'#9b59b6', 4:'#e8553a' };

const ALL_ORBS = [
  { id:'fire_damage',   name:'Fire Damage',   tier:2, elem:'fire',      emoji:'\u{1F525}', stat:'+18' },
  { id:'cold_damage',   name:'Cold Damage',   tier:1, elem:'cold',      emoji:'\u2744\uFE0F',  stat:'+12' },
  { id:'lightning_dmg',  name:'Lightning Dmg', tier:3, elem:'lightning', emoji:'\u26A1',  stat:'+28' },
  { id:'poison_damage', name:'Poison Damage', tier:1, elem:'poison',    emoji:'\u2620\uFE0F',  stat:'+10' },
  { id:'shadow_damage', name:'Shadow Damage', tier:2, elem:'shadow',    emoji:'\u{1F319}', stat:'+20' },
  { id:'lifesteal',     name:'Lifesteal',     tier:2, elem:'physical',  emoji:'\u2694\uFE0F',  stat:'5%'  },
  { id:'armor_rating',  name:'Armor Rating',  tier:1, elem:'physical',  emoji:'\u2694\uFE0F',  stat:'+8'  },
  { id:'block_chance',  name:'Block Chance',   tier:2, elem:'physical', emoji:'\u2694\uFE0F',  stat:'12%' },
  { id:'hp_regen',      name:'HP Regen',      tier:1, elem:'physical',  emoji:'\u2694\uFE0F',  stat:'+3/s'},
  { id:'crit_chance',   name:'Crit Chance',   tier:3, elem:'physical',  emoji:'\u2694\uFE0F',  stat:'15%' },
  { id:'attack_speed',  name:'Attack Speed',  tier:2, elem:'physical',  emoji:'\u2694\uFE0F',  stat:'+18%'},
  { id:'flat_hp',       name:'Flat HP',       tier:2, elem:'physical',  emoji:'\u2694\uFE0F',  stat:'+45' },
  { id:'chance_on_hit', name:'Chance on Hit', tier:1, elem:'physical',  emoji:'\u2694\uFE0F',  stat:'15%' },
  { id:'thorns',        name:'Thorns',        tier:1, elem:'physical',  emoji:'\u2694\uFE0F',  stat:'+8'  },
];

const RECIPES = {
  'fire_damage+chance_on_hit': { name:'Ignite',          elem1:'fire',      elem2:'fire',      emoji:'\u{1F525}', effect:'15% on-hit fire DoT' },
  'cold_damage+chance_on_hit': { name:'Frostbite',       elem1:'cold',      elem2:'cold',      emoji:'\u2744\uFE0F',  effect:'15% on-hit slow + cold DoT' },
  'fire_damage+cold_damage':   { name:'Thermal Shock',   elem1:'fire',      elem2:'cold',      emoji:'\u{1F4A5}', effect:'Stun + 25% DoT bonus' },
  'cold_damage+lightning_dmg': { name:'Static Discharge', elem1:'cold',     elem2:'lightning',  emoji:'\u26A1', effect:'15% chain lightning' },
  'lightning_dmg+chance_on_hit':{ name:'Static Discharge',elem1:'lightning', elem2:'lightning',  emoji:'\u26A1', effect:'15% chain lightning' },
  'fire_damage+lightning_dmg': { name:'Storm of Flames', elem1:'fire',      elem2:'lightning',  emoji:'\u{1F525}', effect:'Cross-element ignite' },
};

/* ═══════════════════════════════════════
   STATE
   ═══════════════════════════════════════ */
let stockpile = []; // array of orb objects with uid
let weaponSlots = new Array(6).fill(null);
let armorSlots  = new Array(6).fill(null);
let wbSlots = [null, null]; // workbench A, B
let selectedOrb = null; // uid
let activePanel = 'weapon';
let uidCounter = 0;

function uid() { return ++uidCounter; }
function cloneOrb(o) { return { ...o, uid: uid() }; }

function elemGrad(elem) {
  const c = ELEM[elem].color;
  return `linear-gradient(135deg, ${hexToRgba(c,0.4)}, ${hexToRgba(c,0.12)})`;
}
function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

/* ═══════════════════════════════════════
   INIT
   ═══════════════════════════════════════ */
function init() {
  // Pre-fill weapon slots
  const fireDmg = cloneOrb(ALL_ORBS.find(o=>o.id==='fire_damage'));
  const coh     = cloneOrb(ALL_ORBS.find(o=>o.id==='chance_on_hit'));
  fireDmg.compound = true; coh.compound = true;
  weaponSlots[0] = fireDmg;
  weaponSlots[1] = coh;

  // Pre-fill armor slots
  armorSlots[0] = cloneOrb(ALL_ORBS.find(o=>o.id==='flat_hp'));
  armorSlots[1] = cloneOrb(ALL_ORBS.find(o=>o.id==='armor_rating'));

  // Remaining orbs go to stockpile — exclude the 4 placed
  const placed = new Set(['fire_damage','chance_on_hit','flat_hp','armor_rating']);
  const remaining = ALL_ORBS.filter(o => !placed.has(o.id));
  // Also add duplicates of the placed ones that weren't used
  stockpile = remaining.map(o => cloneOrb(o));
  // Add back extra copies to total 14 - we have 10 remaining, add 4 more interesting ones
  stockpile.push(cloneOrb(ALL_ORBS.find(o=>o.id==='fire_damage')));
  stockpile.push(cloneOrb(ALL_ORBS.find(o=>o.id==='cold_damage')));
  stockpile.push(cloneOrb(ALL_ORBS.find(o=>o.id==='chance_on_hit')));
  stockpile.push(cloneOrb(ALL_ORBS.find(o=>o.id==='lightning_dmg')));

  render();
}

/* ═══════════════════════════════════════
   RENDER
   ═══════════════════════════════════════ */
function render() {
  renderPanels();
  renderWorkbench();
  renderStockpile();
}

function renderSlot(orb, isCompound) {
  if (!orb) return `<div class="slot empty"><span>+</span></div>`;
  const tc = TIER_COLOR[orb.tier];
  const ec = ELEM[orb.elem].color;
  const badge = isCompound || orb.compound ? `<span class="compound-badge">C</span>` : '';
  const t3 = orb.tier >= 3 ? `box-shadow:0 0 8px ${tc};` : '';
  return `<div class="slot filled" style="--tier-color:${tc};${t3}" data-uid="${orb.uid}">
    <div class="elem-bg" style="background:${elemGrad(orb.elem)}"></div>
    <div class="elem-specular"></div>
    <div class="gem-inner">
      <span class="emoji">${orb.emoji}</span>
      <span class="stat-val">${orb.stat}</span>
    </div>
    ${badge}
  </div>`;
}

function renderPanels() {
  const wp = document.getElementById('panel-weapon');
  const ap = document.getElementById('panel-armor');
  wp.className = `item-panel ${activePanel==='weapon'?'active':'inactive'}`;
  ap.className = `item-panel ${activePanel==='armor'?'active':'inactive'}`;

  let whtml = '';
  for (let i = 0; i < 6; i++) whtml += renderSlot(weaponSlots[i]);
  document.getElementById('weapon-slots').innerHTML = whtml;

  let ahtml = '';
  for (let i = 0; i < 6; i++) ahtml += renderSlot(armorSlots[i]);
  document.getElementById('armor-slots').innerHTML = ahtml;
}

function renderWorkbench() {
  // Slot A
  const wba = document.getElementById('wb-a');
  if (wbSlots[0]) {
    const o = wbSlots[0], tc = TIER_COLOR[o.tier];
    wba.className = 'wb-slot filled';
    wba.style.cssText = `--tier-color:${tc}`;
    wba.innerHTML = `<div class="elem-bg" style="background:${elemGrad(o.elem)}"></div><div class="elem-specular"></div><div class="gem-inner"><span class="emoji">${o.emoji}</span><span class="stat-val">${o.stat}</span></div>`;
  } else {
    wba.className = 'wb-slot empty';
    wba.style.cssText = '';
    wba.innerHTML = '<span>+</span>';
  }

  // Slot B
  const wbb = document.getElementById('wb-b');
  if (wbSlots[1]) {
    const o = wbSlots[1], tc = TIER_COLOR[o.tier];
    wbb.className = 'wb-slot filled';
    wbb.style.cssText = `--tier-color:${tc}`;
    wbb.innerHTML = `<div class="elem-bg" style="background:${elemGrad(o.elem)}"></div><div class="elem-specular"></div><div class="gem-inner"><span class="emoji">${o.emoji}</span><span class="stat-val">${o.stat}</span></div>`;
  } else {
    wbb.className = 'wb-slot empty';
    wbb.style.cssText = '';
    wbb.innerHTML = '<span>+</span>';
  }

  // Result
  const res = document.getElementById('wb-result');
  const btn = document.getElementById('btn-combine');
  if (wbSlots[0] && wbSlots[1]) {
    const recipe = findRecipe(wbSlots[0].id, wbSlots[1].id);
    if (recipe) {
      const c1 = ELEM[recipe.elem1].color, c2 = ELEM[recipe.elem2].color;
      const grad = recipe.elem1 === recipe.elem2
        ? elemGrad(recipe.elem1)
        : `linear-gradient(135deg, ${hexToRgba(c1,0.35)}, ${hexToRgba(c2,0.35)})`;
      res.className = 'wb-result valid';
      res.style.cssText = `--result-color:${c1};--result-glow:${hexToRgba(c1,0.3)};background:${grad}`;
      res.innerHTML = `<span class="r-icon">${recipe.emoji}</span><span class="r-name">${recipe.name}</span><span class="r-effect">${recipe.effect}</span>`;
      btn.className = 'btn-combine enabled';
    } else {
      res.className = 'wb-result invalid';
      res.style.cssText = '';
      res.innerHTML = `<span class="r-invalid">\u2717 No recipe</span>`;
      btn.className = 'btn-combine disabled';
    }
  } else {
    res.className = 'wb-result';
    res.style.cssText = '';
    res.innerHTML = `<span class="r-empty">?</span><span class="r-hint">Drop two gems</span>`;
    btn.className = 'btn-combine disabled';
  }
}

function findRecipe(idA, idB) {
  return RECIPES[idA+'+'+idB] || RECIPES[idB+'+'+idA] || null;
}

function renderStockpile() {
  const grid = document.getElementById('sp-grid');
  document.getElementById('sp-count').textContent = stockpile.length;
  let html = '';
  for (const o of stockpile) {
    const tc = TIER_COLOR[o.tier];
    const ec = ELEM[o.elem].color;
    const sel = selectedOrb === o.uid ? 'selected' : '';
    const t3cls = o.tier >= 3 ? 't3-glow' : '';
    html += `<div class="gem-card ${sel}" data-uid="${o.uid}" style="--elem-color:${ec};--glow-color:${hexToRgba(ec,0.5)}">
      <div class="gc-icon ${t3cls}" style="--tier-color:${tc}">
        <div class="bg-fill" style="background:${elemGrad(o.elem)}"></div>
        <div class="specular"></div>
        <span class="emoji">${o.emoji}</span>
        <span class="stat-val">${o.stat}</span>
      </div>
      <span class="gc-name">${o.name}</span>
    </div>`;
  }
  grid.innerHTML = html;
}

/* ═══════════════════════════════════════
   INTERACTION
   ═══════════════════════════════════════ */
function findOrbByUid(uid) {
  return stockpile.find(o=>o.uid===uid) || null;
}

function removeFromStockpile(uid) {
  const idx = stockpile.findIndex(o=>o.uid===uid);
  if (idx >= 0) { const o = stockpile.splice(idx,1)[0]; return o; }
  return null;
}

// Click stockpile gem
document.getElementById('sp-grid').addEventListener('click', e => {
  const card = e.target.closest('.gem-card');
  if (!card) return;
  const uid = Number(card.dataset.uid);
  if (selectedOrb === uid) { selectedOrb = null; }
  else { selectedOrb = uid; }
  render();
});

// Click item panel to switch active
document.getElementById('panel-weapon').addEventListener('click', e => {
  const slot = e.target.closest('.slot');
  if (slot && slot.classList.contains('empty') && selectedOrb) {
    placeInItemSlot('weapon', slot);
    return;
  }
  if (activePanel !== 'weapon') { activePanel = 'weapon'; render(); }
});
document.getElementById('panel-armor').addEventListener('click', e => {
  const slot = e.target.closest('.slot');
  if (slot && slot.classList.contains('empty') && selectedOrb) {
    placeInItemSlot('armor', slot);
    return;
  }
  if (activePanel !== 'armor') { activePanel = 'armor'; render(); }
});

function placeInItemSlot(panel, slotEl) {
  const slots = panel === 'weapon' ? weaponSlots : armorSlots;
  const grid = slotEl.parentElement;
  const children = Array.from(grid.children);
  const idx = children.indexOf(slotEl);
  if (idx < 0 || slots[idx]) return;
  const orb = removeFromStockpile(selectedOrb);
  if (!orb) return;
  slots[idx] = orb;
  selectedOrb = null;
  activePanel = panel;
  render();
}

// Click workbench slots
document.getElementById('wb-a').addEventListener('click', () => placeInWb(0));
document.getElementById('wb-b').addEventListener('click', () => placeInWb(1));

function placeInWb(idx) {
  if (wbSlots[idx]) return; // already filled
  if (!selectedOrb) return;
  const orb = removeFromStockpile(selectedOrb);
  if (!orb) return;
  wbSlots[idx] = orb;
  selectedOrb = null;
  render();
}

// Clear
document.getElementById('btn-clear').addEventListener('click', () => {
  for (let i = 0; i < 2; i++) {
    if (wbSlots[i]) { stockpile.push(wbSlots[i]); wbSlots[i] = null; }
  }
  render();
});

// Combine
document.getElementById('btn-combine').addEventListener('click', () => {
  if (!wbSlots[0] || !wbSlots[1]) return;
  const recipe = findRecipe(wbSlots[0].id, wbSlots[1].id);
  if (!recipe) return;
  // Create compound orb
  const compound = {
    uid: uid(),
    id: recipe.name.toLowerCase().replace(/\s+/g,'_'),
    name: recipe.name,
    tier: Math.max(wbSlots[0].tier, wbSlots[1].tier),
    elem: recipe.elem1,
    emoji: recipe.emoji,
    stat: recipe.effect.split(' ')[0],
    compound: true,
  };
  wbSlots = [null, null];
  stockpile.push(compound);
  selectedOrb = null;
  render();
  showToast(`Forged ${recipe.name}!`);
});

function showToast(msg) {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => { el.classList.add('out'); }, 1500);
  setTimeout(() => { el.remove(); }, 1800);
}

/* Timer countdown (cosmetic) */
let timeLeft = 75;
function tick() {
  const m = Math.floor(timeLeft/60);
  const s = String(timeLeft%60).padStart(2,'0');
  document.getElementById('timer').textContent = m+':'+s;
  if (timeLeft > 0) timeLeft--;
}
setInterval(tick, 1000);

// Go!
init();
</script>
</body>
</html>
