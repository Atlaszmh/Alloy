<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Mockup E — Forge V2: Classic (WoW Tooltip Style)</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --s-900:#060608;--s-850:#0a0a0f;--s-800:#111118;--s-700:#1a1a26;--s-600:#252536;--s-500:#363650;--s-400:#4a4a68;--s-300:#6a6a88;
  --gold-500:#d4a834;--gold-400:#e0bc4a;--gold-300:#ecd06a;
  --teal-400:#2dd4bf;--teal-300:#5eead4;
  --bronze-500:#a08050;--bronze-400:#b89868;--bronze-300:#c8a878;
  --fire:#e8553a;--cold:#3a9be8;--lightning:#d4c040;--poison:#2db369;--shadow:#8b3ae8;--chaos:#e83a8b;--physical:#c0c0c0;
  --t1:#8a8a8a;--t2:#3a9be8;--t3:#9b59b6;--t4:#e8553a;
  --affix-green:#1eff00;--compound-gold:#ecd06a;--inherent-teal:#2dd4bf;--empty-grey:#6a6a88;--base-white:#ffffff;
  --shadow-card:0 4px 24px rgba(0,0,0,.6),0 1px 4px rgba(0,0,0,.4);
  --shadow-glow:0 0 20px rgba(212,168,52,.25);
  --shadow-inset:inset 0 1px 3px rgba(0,0,0,.5);
  --shadow-button:0 2px 8px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.08);
}
html,body{height:100%;overflow:hidden;background:var(--s-900);color:#e0e0e8;font-family:'DM Sans',sans-serif}
body{display:flex;justify-content:center;align-items:center}

/* 9:16 frame */
.frame{position:relative;width:min(420px,100vw);height:min(746px,100vh);aspect-ratio:9/16;background:var(--s-850);overflow:hidden;display:flex;flex-direction:column;border-radius:12px;box-shadow:var(--shadow-card)}
.frame::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 40% at 50% 18%,rgba(212,168,52,.06),transparent 70%),radial-gradient(ellipse 50% 30% at 30% 80%,rgba(45,212,191,.04),transparent 60%);pointer-events:none;z-index:1}
.frame::after{content:'';position:absolute;inset:0;opacity:.035;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");pointer-events:none;z-index:2}
.frame>*{position:relative;z-index:3}

.raj{font-family:'Rajdhani',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.mono{font-family:'JetBrains Mono',monospace;font-weight:700;font-variant-numeric:tabular-nums}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 6px;flex-shrink:0}
.header-left h1{font-size:15px;color:var(--gold-400)}
.header-left p{font-size:10px;color:var(--s-400);margin-top:1px}
.header-right{display:flex;align-items:center;gap:10px}
.timer{font-size:13px;color:var(--teal-400);letter-spacing:.02em}
.btn-done{font-size:10px;padding:5px 12px;border:1px solid var(--gold-500);background:linear-gradient(180deg,rgba(212,168,52,.15),rgba(212,168,52,.05));color:var(--gold-400);border-radius:6px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow-button)}
.btn-done:hover{background:linear-gradient(180deg,rgba(212,168,52,.25),rgba(212,168,52,.1));box-shadow:var(--shadow-glow)}

/* Cards Row */
.cards-row{display:flex;gap:8px;padding:0 10px;flex-shrink:0}
.item-card{flex:1;min-width:0;background:linear-gradient(180deg,var(--s-700),var(--s-800));border-radius:6px;border:1px solid var(--s-600);overflow:hidden;cursor:pointer;transition:border-color .2s,box-shadow .2s;padding:0;box-shadow:var(--shadow-inset)}
.item-card.active{border-color:rgba(212,168,52,.5);box-shadow:0 0 12px rgba(212,168,52,.18),var(--shadow-inset)}

/* Card inner sections */
.card-name-row{padding:8px 10px 4px;display:flex;align-items:baseline;gap:5px}
.card-icon{font-size:14px}
.card-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;color:var(--gold-400);text-transform:uppercase;letter-spacing:.04em}
.card-type-row{padding:0 10px 6px;display:flex;justify-content:space-between;font-size:10px;color:var(--s-300)}
.card-divider{height:1px;background:var(--s-600);margin:0 8px}

.card-section{padding:4px 10px}
.inherent-line{font-size:11px;color:var(--inherent-teal);line-height:1.5;font-family:'DM Sans',sans-serif}
.base-line{font-size:11px;color:var(--bronze-400);line-height:1.5}

/* Affix lines — WoW green */
.affix-line{font-size:11px;color:var(--affix-green);line-height:1.5;font-family:'DM Sans',sans-serif;display:flex;align-items:baseline;gap:4px;animation:slideUp .2s ease-out}
.affix-line .emoji{font-size:11px;flex-shrink:0}
.affix-line .stat-text{flex:1;min-width:0}
.tier-row{padding:0 10px 0 22px;font-size:9px;line-height:1.3}
.tier-pill{display:inline-block;padding:0px 6px;border-radius:8px;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.tier-pill.t1{background:rgba(138,138,138,.18);color:var(--t1)}
.tier-pill.t2{background:rgba(58,155,232,.18);color:var(--t2)}
.tier-pill.t3{background:rgba(155,89,182,.18);color:var(--t3)}
.tier-pill.t4{background:rgba(232,85,58,.18);color:var(--t4)}

/* Compound lines — gold */
.compound-name-line{font-size:11px;color:var(--compound-gold);line-height:1.5;font-weight:700;font-family:'DM Sans',sans-serif;padding:1px 0}
.compound-components{font-size:10px;color:var(--bronze-400);line-height:1.4;padding-left:12px}
.compound-effect{font-size:10px;color:var(--s-300);line-height:1.4;padding-left:12px;font-style:italic}

/* Empty slots */
.empty-slot{font-size:10px;color:var(--empty-grey);line-height:1.6;cursor:pointer;padding:0px 0;transition:color .15s}
.empty-slot:hover{color:var(--gold-400)}
.card-footer{padding:4px 10px 6px;font-size:9px;color:var(--s-400)}

@keyframes slideUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Workbench */
.workbench{padding:6px 12px;flex-shrink:0;display:flex;align-items:center;gap:6px;background:linear-gradient(180deg,var(--s-800),var(--s-850));border-top:1px solid var(--s-700);border-bottom:1px solid var(--s-700);position:relative}
.workbench::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 100% at 50% 50%,rgba(160,128,80,.04),transparent);pointer-events:none}
.wb-title{font-size:10px;color:var(--bronze-400);flex-shrink:0;position:relative}
.wb-slots{display:flex;align-items:center;gap:5px;flex:1;min-width:0;position:relative}
.wb-drop{width:36px;height:36px;border-radius:6px;border:1.5px dashed var(--s-500);background:var(--s-800);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--s-400);cursor:pointer;transition:all .15s;flex-shrink:0}
.wb-drop:hover{border-color:var(--bronze-400)}
.wb-drop.filled{border-style:solid;border-color:var(--s-400)}
.wb-drop .orb-mini{width:30px;height:30px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:15px}
.wb-plus{font-size:12px;color:var(--s-400);flex-shrink:0}
.wb-arrow{font-size:13px;color:var(--s-400);flex-shrink:0}
.wb-result{flex:1;min-width:0;height:36px;border-radius:6px;border:1px solid var(--s-600);background:var(--s-800);display:flex;align-items:center;justify-content:center;padding:0 6px;font-size:10px;color:var(--s-400);transition:all .25s;overflow:hidden;position:relative}
.wb-result.valid{border-color:var(--gold-500);box-shadow:0 0 10px rgba(212,168,52,.15)}
.wb-result.valid .result-name{color:var(--compound-gold)}
.wb-result.invalid{border-color:var(--fire)}
.wb-result .result-name{font-size:11px;font-weight:500;line-height:1.2}
.wb-result .result-desc{font-size:8px;color:var(--s-300);line-height:1.2}
.wb-actions{display:flex;gap:4px;flex-shrink:0;position:relative}
.btn-combine,.btn-clear{font-size:9px;padding:3px 8px;border-radius:5px;border:none;cursor:pointer;transition:all .15s;box-shadow:var(--shadow-button)}
.btn-combine{background:linear-gradient(180deg,rgba(212,168,52,.25),rgba(212,168,52,.1));color:var(--gold-400);border:1px solid var(--gold-500)}
.btn-combine:hover{background:linear-gradient(180deg,rgba(212,168,52,.35),rgba(212,168,52,.15))}
.btn-combine:disabled{opacity:.4;pointer-events:none}
.btn-clear{background:var(--s-700);color:var(--s-300);border:1px solid var(--s-600)}
.btn-clear:hover{background:var(--s-600)}

/* Stockpile */
.stockpile-wrap{flex:1;min-height:0;overflow-y:auto;padding:6px 10px 6px}
.stockpile-wrap::-webkit-scrollbar{width:4px}
.stockpile-wrap::-webkit-scrollbar-thumb{background:var(--s-500);border-radius:2px}
.stock-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.orb{position:relative;border-radius:8px;aspect-ratio:1;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1.5px solid transparent;transition:all .15s;overflow:hidden}
.orb::before{content:'';position:absolute;inset:0;border-radius:7px;opacity:.55;z-index:0}
.orb::after{content:'';position:absolute;top:8%;left:18%;width:40%;height:30%;background:radial-gradient(ellipse,rgba(255,255,255,.28),transparent 70%);border-radius:50%;z-index:1;pointer-events:none}
.orb>*{position:relative;z-index:2}
.orb .orb-emoji{font-size:18px;line-height:1}
.orb .orb-val{font-size:10px;color:#fff;margin-top:1px;text-shadow:0 1px 3px rgba(0,0,0,.7)}
.orb .orb-name{font-size:8px;color:rgba(255,255,255,.7);margin-top:auto;padding-bottom:3px;text-align:center;line-height:1.1;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-left:2px;padding-right:2px}
.orb.t1{border-color:rgba(138,138,138,.4)}.orb.t2{border-color:rgba(58,155,232,.4)}.orb.t3{border-color:rgba(155,89,182,.4)}.orb.t4{border-color:rgba(232,85,58,.4)}
.orb.selected{transform:scale(1.08);box-shadow:0 0 14px rgba(212,168,52,.5);border-color:var(--gold-400)!important;animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 14px rgba(212,168,52,.5)}50%{box-shadow:0 0 22px rgba(212,168,52,.7)}}
.orb.used{opacity:.25;pointer-events:none}

.orb.el-fire::before{background:linear-gradient(135deg,#e8553a,#a03020)}
.orb.el-cold::before{background:linear-gradient(135deg,#3a9be8,#2060a0)}
.orb.el-lightning::before{background:linear-gradient(135deg,#d4c040,#a09020)}
.orb.el-poison::before{background:linear-gradient(135deg,#2db369,#1a7040)}
.orb.el-shadow::before{background:linear-gradient(135deg,#8b3ae8,#5020a0)}
.orb.el-chaos::before{background:linear-gradient(135deg,#e83a8b,#a02060)}
.orb.el-physical::before{background:linear-gradient(135deg,#8090a0,#505868)}

/* Stats bar */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);padding:6px 14px 10px;gap:4px;flex-shrink:0;border-top:1px solid var(--s-700)}
.stat-col{text-align:center}
.stat-col .stat-val{font-size:13px;color:#fff}
.stat-col .stat-lbl{font-size:8px;color:var(--s-400);text-transform:uppercase;letter-spacing:.06em}

/* Toast */
.toast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.9);background:var(--s-700);border:1px solid var(--gold-500);padding:10px 24px;border-radius:8px;font-size:12px;color:var(--gold-300);box-shadow:0 0 30px rgba(212,168,52,.2);opacity:0;pointer-events:none;transition:all .3s;z-index:100}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
</style>
</head>
<body>
<div class="frame" id="frame">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1 class="raj">Forge Phase</h1>
      <p class="raj" style="font-size:10px;letter-spacing:.06em;color:var(--s-400)">Round 1 &middot; Flux: 8</p>
    </div>
    <div class="header-right">
      <span class="mono timer">1:15</span>
      <button class="raj btn-done">Done Forging</button>
    </div>
  </div>

  <!-- Side-by-Side Item Cards -->
  <div class="cards-row" id="cardsRow"></div>

  <!-- Workbench -->
  <div class="workbench">
    <span class="raj wb-title">&#9670; Forge &#9670;</span>
    <div class="wb-slots">
      <div class="wb-drop" id="wbSlot0" onclick="placeInWorkbench(0)">+</div>
      <span class="wb-plus">+</span>
      <div class="wb-drop" id="wbSlot1" onclick="placeInWorkbench(1)">+</div>
      <span class="wb-arrow">&#9654;</span>
      <div class="wb-result" id="wbResult"><span style="color:var(--s-400)">?</span></div>
    </div>
    <div class="wb-actions">
      <button class="raj btn-combine" id="btnCombine" disabled onclick="doCombine()">Combine</button>
      <button class="raj btn-clear" onclick="doClear()">Clear</button>
    </div>
  </div>

  <!-- Stockpile -->
  <div class="stockpile-wrap">
    <div class="stock-grid" id="stockGrid"></div>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat-col"><div class="mono stat-val" id="statHP">285</div><div class="raj stat-lbl">HP</div></div>
    <div class="stat-col"><div class="mono stat-val" id="statDMG">42</div><div class="raj stat-lbl">DMG</div></div>
    <div class="stat-col"><div class="mono stat-val" id="statArmor">17%</div><div class="raj stat-lbl">Armor</div></div>
    <div class="stat-col"><div class="mono stat-val" id="statCrit">13%</div><div class="raj stat-lbl">Crit</div></div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
// ── Data ──
const CATEGORY_ORDER = ['offensive','defensive','sustain','utility','trigger','compound'];

const AFFIX_ORDER = {
  offensive:['flat_physical','fire_damage','cold_damage','lightning_damage','poison_damage','shadow_damage','chaos_damage','crit_chance','crit_mult','attack_speed','armor_pen','elemental_pen'],
  defensive:['flat_hp','armor','block_chance','dodge','barrier','hp_regen','damage_reduction','fortify'],
  sustain:['lifesteal','thorns','life_on_kill'],
  utility:['initiative','dot_mult','stun_chance','slow_on_hit'],
  trigger:['chance_on_hit','chance_on_taking_damage','chance_on_crit','chance_on_block','chance_on_kill','chance_on_low_hp'],
  compound:[]
};

const ELEM_EMOJI = {fire:'\u{1F525}',cold:'\u2744\uFE0F',lightning:'\u26A1',poison:'\u2620\uFE0F',shadow:'\u{1F319}',chaos:'\u{1F300}',physical:'\u2694\uFE0F'};

const AFFIX_LABELS = {
  flat_physical:'Physical Damage', fire_damage:'Fire Damage', cold_damage:'Cold Damage',
  lightning_damage:'Lightning Damage', poison_damage:'Poison Damage', shadow_damage:'Shadow Damage',
  chaos_damage:'Chaos Damage', crit_chance:'Critical Strike Chance', crit_mult:'Critical Multiplier',
  attack_speed:'Attack Speed', armor_pen:'Armor Penetration', elemental_pen:'Elemental Penetration',
  flat_hp:'Max HP', armor:'Phys Dmg Reduction', block_chance:'Block Chance', dodge:'Dodge',
  barrier:'Barrier', hp_regen:'HP Regen', damage_reduction:'Damage Reduction', fortify:'Fortify',
  lifesteal:'Lifesteal', thorns:'Thorns', life_on_kill:'Life on Kill',
  initiative:'Initiative', dot_mult:'DoT Multiplier', stun_chance:'Stun Chance', slow_on_hit:'Slow on Hit',
  chance_on_hit:'Chance on Hit', chance_on_taking_damage:'Ch. on Taking Dmg',
  chance_on_crit:'Chance on Crit', chance_on_block:'Chance on Block',
  chance_on_kill:'Chance on Kill', chance_on_low_hp:'Chance on Low HP'
};

const ELEM_FOR_AFFIX = {fire_damage:'fire',cold_damage:'cold',lightning_damage:'lightning',poison_damage:'poison',shadow_damage:'shadow',chaos_damage:'chaos',flat_physical:'physical'};

function affixCategory(id){
  for(const cat of CATEGORY_ORDER){
    if(cat==='compound') continue;
    if(AFFIX_ORDER[cat].includes(id)) return cat;
  }
  return 'utility';
}
function affixSortKey(id){
  const cat = affixCategory(id);
  const ci = CATEGORY_ORDER.indexOf(cat);
  const ai = (AFFIX_ORDER[cat]||[]).indexOf(id);
  return ci*100+(ai>=0?ai:99);
}

// Item cards
const items = [
  {
    id:'weapon', name:'Sword', icon:'\u2694', type:'One-Hand', subtype:'Weapon',
    inherent:['+5% Critical Strike Chance','-5% Attack Interval'],
    bases:'STR / VIT',
    affixes:[
      {id:'fire_damage',value:'+19',tier:2},
      {id:'chance_on_hit',value:'+3',tier:1},
    ],
    compounds:[{name:'Ignite',components:'\u{1F525} Fire Damage + Chance on Hit',effect:'15% on-hit \u00B7 Fire DoT 2x'}],
    maxSlots:6
  },
  {
    id:'armor', name:'Chainmail', icon:'\u{1F6E1}', type:'Body', subtype:'Armor',
    inherent:['+5% Armor','+20 Max HP'],
    bases:'VIT / STR',
    affixes:[
      {id:'flat_hp',value:'+68',tier:2},
      {id:'armor',value:'+11.5%',tier:1},
    ],
    compounds:[],
    maxSlots:6
  }
];

let activeCard = 0;
let selectedOrb = null;
const workbenchSlots = [null,null];

// Stockpile orbs
const stockpile = [
  {id:'cold_damage',label:'Cold Dmg',value:'+12',tier:1,element:'cold',emoji:'\u2744\uFE0F'},
  {id:'lightning_damage',label:'Ltn Dmg',value:'+33',tier:3,element:'lightning',emoji:'\u26A1'},
  {id:'poison_damage',label:'Psn Dmg',value:'+10',tier:1,element:'poison',emoji:'\u2620\uFE0F'},
  {id:'shadow_damage',label:'Shd Dmg',value:'+20',tier:2,element:'shadow',emoji:'\u{1F319}'},
  {id:'lifesteal',label:'Lifesteal',value:'7%',tier:2,element:'physical',emoji:'\u2694\uFE0F'},
  {id:'block_chance',label:'Block Ch',value:'9%',tier:2,element:'physical',emoji:'\u2694\uFE0F'},
  {id:'hp_regen',label:'HP Regen',value:'+5/s',tier:1,element:'physical',emoji:'\u2694\uFE0F'},
  {id:'crit_chance',label:'Crit Ch',value:'16%',tier:3,element:'physical',emoji:'\u2694\uFE0F'},
  {id:'attack_speed',label:'Atk Spd',value:'12%',tier:2,element:'physical',emoji:'\u2694\uFE0F'},
  {id:'stun_chance',label:'Stun Ch',value:'4%',tier:1,element:'physical',emoji:'\u2694\uFE0F'},
  {id:'thorns',label:'Thorns',value:'+9',tier:1,element:'physical',emoji:'\u2694\uFE0F'},
  {id:'chance_on_taking_damage',label:'Ch.on Dmg',value:'+4',tier:1,element:'physical',emoji:'\u2694\uFE0F'},
];
const orbUsed = new Array(stockpile.length).fill(false);

// ── Recipes ──
const RECIPES = {
  'chance_on_hit+fire_damage':{name:'Ignite',desc:'15% on-hit fire DoT 2x',components:'\u{1F525} Fire Damage + Chance on Hit'},
  'fire_damage+chance_on_hit':{name:'Ignite',desc:'15% on-hit fire DoT 2x',components:'\u{1F525} Fire Damage + Chance on Hit'},
  'chance_on_hit+cold_damage':{name:'Frostbite',desc:'15% on-hit slow + cold DoT',components:'\u2744\uFE0F Cold Damage + Chance on Hit'},
  'cold_damage+chance_on_hit':{name:'Frostbite',desc:'15% on-hit slow + cold DoT',components:'\u2744\uFE0F Cold Damage + Chance on Hit'},
  'cold_damage+fire_damage':{name:'Thermal Shock',desc:'Stun + 25% DoT bonus',components:'\u{1F525}\u2744\uFE0F Fire + Cold'},
  'fire_damage+cold_damage':{name:'Thermal Shock',desc:'Stun + 25% DoT bonus',components:'\u{1F525}\u2744\uFE0F Fire + Cold'},
  'chance_on_hit+lightning_damage':{name:'Static Discharge',desc:'15% chain lightning',components:'\u26A1 Lightning Damage + Chance on Hit'},
  'lightning_damage+chance_on_hit':{name:'Static Discharge',desc:'15% chain lightning',components:'\u26A1 Lightning Damage + Chance on Hit'},
  'fire_damage+lightning_damage':{name:'Storm of Flames',desc:'Cross-element proc',components:'\u{1F525}\u26A1 Fire + Lightning'},
  'lightning_damage+fire_damage':{name:'Storm of Flames',desc:'Cross-element proc',components:'\u{1F525}\u26A1 Fire + Lightning'},
};

// ── Render Cards ──
function renderCards(){
  const row = document.getElementById('cardsRow');
  row.innerHTML = '';

  items.forEach((item,idx)=>{
    const card = document.createElement('div');
    card.className = 'item-card'+(idx===activeCard?' active':'');
    card.onclick = (e)=>{
      if(e.target.closest('.empty-slot')) return;
      activeCard = idx;
      renderCards();
    };

    // Sort affixes deterministically
    const sortedAffixes = [...item.affixes].sort((a,b)=>affixSortKey(a.id)-affixSortKey(b.id));

    let html = '';

    // Name row
    html += `<div class="card-name-row"><span class="card-icon">${item.icon}</span><span class="card-name raj">${item.name}</span></div>`;

    // Type row
    html += `<div class="card-type-row"><span>${item.type}</span><span>${item.subtype}</span></div>`;

    // Divider
    html += `<div class="card-divider"></div>`;

    // Inherent stats (teal)
    html += `<div class="card-section">`;
    item.inherent.forEach(line=>{
      html += `<div class="inherent-line">${line}</div>`;
    });
    html += `</div>`;

    // Divider
    html += `<div class="card-divider"></div>`;

    // Base stats (bronze)
    html += `<div class="card-section"><div class="base-line">${item.bases}</div></div>`;

    // Divider
    html += `<div class="card-divider"></div>`;

    // Affixes in WoW green "Equip:" style
    html += `<div class="card-section">`;
    sortedAffixes.forEach(af=>{
      const elem = ELEM_FOR_AFFIX[af.id];
      const emoji = elem ? ELEM_EMOJI[elem]+' ' : '';
      const label = AFFIX_LABELS[af.id] || af.id;
      const valStr = af.value ? ' '+af.value : '';
      html += `<div class="affix-line"><span class="stat-text">Equip: ${emoji}${valStr} ${label}</span></div>`;
      const tc = 't'+af.tier;
      html += `<div class="tier-row"><span class="tier-pill ${tc}">Tier ${af.tier}</span></div>`;
    });
    html += `</div>`;

    // Compounds (gold)
    if(item.compounds.length > 0){
      html += `<div class="card-divider"></div>`;
      html += `<div class="card-section">`;
      item.compounds.forEach(c=>{
        html += `<div class="compound-name-line">\u2726 ${c.name}</div>`;
        html += `<div class="compound-components">${c.components}</div>`;
        html += `<div class="compound-effect">${c.effect}</div>`;
      });
      html += `</div>`;
    }

    // Divider
    html += `<div class="card-divider"></div>`;

    // Empty slots
    const filledCount = item.affixes.length + item.compounds.length;
    const emptyCount = Math.max(0, item.maxSlots - filledCount);
    html += `<div class="card-section">`;
    for(let s=0; s<emptyCount; s++){
      html += `<div class="empty-slot" data-card="${idx}" data-slot="${s}">\u25C7 Empty Slot</div>`;
    }
    html += `</div>`;

    // Footer
    html += `<div class="card-footer">${filledCount} of ${item.maxSlots} slots filled</div>`;

    card.innerHTML = html;
    row.appendChild(card);
  });

  // Bind empty slot clicks
  document.querySelectorAll('.empty-slot').forEach(el=>{
    el.addEventListener('click',(e)=>{
      e.stopPropagation();
      const cardIdx = parseInt(el.dataset.card);
      placeOrbInSlot(cardIdx);
    });
  });
}

// ── Place orb into card slot ──
function placeOrbInSlot(cardIdx){
  if(selectedOrb === null) return;
  const orb = stockpile[selectedOrb];
  const item = items[cardIdx];
  const filledCount = item.affixes.length + item.compounds.length;
  if(filledCount >= item.maxSlots){
    showToast('No empty slots!');
    return;
  }

  // Add the affix
  item.affixes.push({id:orb.id, value:orb.value, tier:orb.tier});
  orbUsed[selectedOrb] = true;
  selectedOrb = null;

  renderCards();
  renderStockpile();
  showToast(`${AFFIX_LABELS[orb.id]||orb.id} socketed!`);
}

// ── Render Stockpile ──
function renderStockpile(){
  const grid = document.getElementById('stockGrid');
  grid.innerHTML = '';
  stockpile.forEach((orb,i)=>{
    const el = document.createElement('div');
    el.className = `orb el-${orb.element} t${orb.tier}${orbUsed[i]?' used':''}${selectedOrb===i?' selected':''}`;
    el.innerHTML = `<span class="orb-emoji">${orb.emoji}</span><span class="mono orb-val">${orb.value}</span><span class="orb-name">${orb.label}</span>`;
    el.onclick = ()=>{
      if(orbUsed[i]) return;
      selectedOrb = selectedOrb===i ? null : i;
      renderStockpile();
    };
    grid.appendChild(el);
  });
}

// ── Workbench ──
function placeInWorkbench(slot){
  if(selectedOrb === null) return;
  const orb = stockpile[selectedOrb];

  // If slot already has something, return it
  if(workbenchSlots[slot] !== null){
    orbUsed[workbenchSlots[slot]] = false;
  }

  workbenchSlots[slot] = selectedOrb;
  orbUsed[selectedOrb] = true;
  selectedOrb = null;

  renderStockpile();
  renderWorkbench();
}

function renderWorkbench(){
  for(let i=0;i<2;i++){
    const el = document.getElementById('wbSlot'+i);
    if(workbenchSlots[i]!==null){
      const orb = stockpile[workbenchSlots[i]];
      el.classList.add('filled');
      el.innerHTML = `<div class="orb-mini" style="background:linear-gradient(135deg,${getElemBgStart(orb.element)},${getElemBgEnd(orb.element)});font-size:15px">${orb.emoji}</div>`;
    } else {
      el.classList.remove('filled');
      el.innerHTML = '+';
    }
  }

  // Check recipe
  const res = document.getElementById('wbResult');
  const btn = document.getElementById('btnCombine');
  if(workbenchSlots[0]!==null && workbenchSlots[1]!==null){
    const key = stockpile[workbenchSlots[0]].id+'+'+stockpile[workbenchSlots[1]].id;
    const recipe = RECIPES[key];
    if(recipe){
      res.className = 'wb-result valid';
      res.innerHTML = `<div style="text-align:center"><div class="result-name">\u2726 ${recipe.name}</div><div class="result-desc">${recipe.desc}</div></div>`;
      btn.disabled = false;
    } else {
      res.className = 'wb-result invalid';
      res.innerHTML = '<span style="color:var(--fire);font-size:10px">No recipe</span>';
      btn.disabled = true;
    }
  } else {
    res.className = 'wb-result';
    res.innerHTML = '<span style="color:var(--s-400)">?</span>';
    btn.disabled = true;
  }
}

function getElemBgStart(el){
  const m={fire:'#e8553a',cold:'#3a9be8',lightning:'#d4c040',poison:'#2db369',shadow:'#8b3ae8',chaos:'#e83a8b',physical:'#8090a0'};
  return m[el]||'#666';
}
function getElemBgEnd(el){
  const m={fire:'#a03020',cold:'#2060a0',lightning:'#a09020',poison:'#1a7040',shadow:'#5020a0',chaos:'#a02060',physical:'#505868'};
  return m[el]||'#444';
}

function doCombine(){
  if(workbenchSlots[0]===null||workbenchSlots[1]===null) return;
  const key = stockpile[workbenchSlots[0]].id+'+'+stockpile[workbenchSlots[1]].id;
  const recipe = RECIPES[key];
  if(!recipe) return;

  // Place compound into active card
  const item = items[activeCard];
  const filledCount = item.affixes.length + item.compounds.length;
  if(filledCount >= item.maxSlots){
    showToast('No empty slots on active card!');
    return;
  }

  item.compounds.push({
    name:recipe.name,
    components:recipe.components,
    effect:recipe.desc
  });

  // Clear workbench (orbs stay consumed)
  workbenchSlots[0] = null;
  workbenchSlots[1] = null;

  renderCards();
  renderWorkbench();
  renderStockpile();
  showToast(`\u2726 ${recipe.name} forged!`);
}

function doClear(){
  for(let i=0;i<2;i++){
    if(workbenchSlots[i]!==null){
      orbUsed[workbenchSlots[i]] = false;
      workbenchSlots[i] = null;
    }
  }
  selectedOrb = null;
  renderWorkbench();
  renderStockpile();
}

// ── Toast ──
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1200);
}

// ── Init ──
renderCards();
renderStockpile();
renderWorkbench();
</script>
</body>
</html>
